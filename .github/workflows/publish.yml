name: Publish to npm

on:
  push:
    branches: [main]
    paths:
      - package.json
      - package-lock.json
      - src/**
      - tsconfig.json
      - tsconfig.build.json
      - vite.config.mjs
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write          # Required for npm OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22       # Node 22 LTS ships npm 10.9+ which supports OIDC publish auth
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Typecheck & build
        run: |
          npm run typecheck
          npm run build

      - name: Check if publish is needed
        id: check
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view v-datatable-plus version 2>/dev/null || echo "none")
          echo "local=$LOCAL"       >> "$GITHUB_OUTPUT"
          echo "published=$PUBLISHED" >> "$GITHUB_OUTPUT"
          if [ "$LOCAL" = "$PUBLISHED" ]; then
            echo "needed=false" >> "$GITHUB_OUTPUT"
            echo "v$LOCAL already on npm — skipping publish."
          else
            echo "needed=true"  >> "$GITHUB_OUTPUT"
            echo "Will publish v$LOCAL (npm has ${PUBLISHED})."
          fi

      - name: Publish (OIDC trusted publishing)
        if: steps.check.outputs.needed == 'true'
        run: npm publish --provenance --access public